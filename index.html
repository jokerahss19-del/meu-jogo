<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>quadrado ki korre</title>
    <style>
        body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            transition: background-color 0.5s ease;
        }

        .container { display: flex; gap: 30px; align-items: stretch; }
        .game-section { display: flex; flex-direction: column; align-items: center; }
        
        .canvas-container {
            position: relative; /* Necessário para sobrepor a tela de Game Over */
        }

        canvas {
            border: 4px solid #333;
            background-color: #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transition: background-color 0.5s ease;
            display: block;
        }

        /* --- ESTILOS DA TELA DE GAME OVER --- */
        .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .game-over-screen h2 {
            color: #ff0055;
            font-size: 50px;
            margin: 0 0 10px 0;
            text-shadow: 0 0 20px #ff0055;
            text-transform: uppercase;
        }

        .game-over-screen p {
            font-size: 24px;
            margin-bottom: 30px;
        }

        #playAgainBtn {
            background-color: #00ffcc;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 0 0 15px #00ffcc;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #playAgainBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px #00ffcc;
        }
        /* ------------------------------------ */

        #ui { margin-bottom: 15px; text-align: center; }
        .score-container { font-size: 28px; font-weight: bold; color: #00ffcc; }

        .sidebar { width: 250px; display: flex; flex-direction: column; gap: 20px; }
        .high-scores-box { background-color: rgba(42, 42, 42, 0.8); border: 2px solid #444; border-radius: 8px; padding: 15px; flex-grow: 1; }
        .high-scores-box h2 { margin: 0 0 10px 0; color: #ffcc00; font-size: 20px; text-align: center; border-bottom: 1px solid #444; padding-bottom: 5px; }
        ol { padding-left: 20px; margin: 0; }
        li { margin-bottom: 8px; font-size: 16px; }
        .score-val { font-weight: bold; color: #00ffcc; float: right; }

        .teleprompter-box { background-color: #000; border: 2px solid #444; border-radius: 8px; height: 200px; overflow: hidden; position: relative; padding: 10px; }
        .teleprompter-content { position: absolute; width: calc(100% - 20px); text-align: center; color: #fff; font-size: 18px; line-height: 1.5; animation: scrollText 15s linear infinite; }

        @keyframes scrollText { 0% { top: 100%; } 100% { top: -120%; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="game-section">
            <div id="ui">
                <div class="score-container">Score: <span id="score">0</span></div>
                <p style="margin: 5px 0; color: #ccc;">500 reais se vc passar de 40 pontos</p>
            </div>
            
            <div class="canvas-container">
                <canvas id="gameCanvas" width="600" height="400"></canvas>
                
                <div id="gameOverScreen" class="game-over-screen" style="display: none;">
                    <h2>Você Morreu!</h2>
                    <p>Pontuação Final: <span id="finalScoreDisplay" style="color: #00ffcc; font-weight: bold;">0</span></p>
                    <button id="playAgainBtn">Jogar Novamente</button>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="high-scores-box">
                <h2>melhores dessa maquina</h2>
                <ol id="highScoreList"></ol>
            </div>
            <div class="teleprompter-box">
                <div class="teleprompter-content">
                          Este jogo foi desenvolvido por um aluno de jogos digitais do iep por tedio, br ver quem pontua mais
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreListElement = document.getElementById('highScoreList');
        
        // Elementos do Game Over
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreDisplay = document.getElementById('finalScoreDisplay');
        const playAgainBtn = document.getElementById('playAgainBtn');

        let score = 0;
        let gameActive = true;
        let bgColor = { r: 0, g: 0, b: 0 };
        let trail = []; // Armazena posições passadas

        let player = {
            x: 300, y: 200, size: 22,
            dx: 0, dy: 0, speed: 3, color: '#00ffcc'
        };

        let target = { x: 0, y: 0, size: 15, color: '#ff0055' };

        // --- FUNÇÕES DE ÁUDIO ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        
        function playBeep() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // --- NOVA MÚSICA 8-BITS DE FUNDO ---
        let isMusicPlaying = false;
        // Frequências para uma melodia retro básica (C4, E4, G4, C5, etc)
        const melodyNotes = [261.63, 329.63, 392.00, 523.25, 392.00, 329.63, 261.63, 196.00];
        let noteIndex = 0;

        function playBackgroundMusic() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            // Toca apenas se o jogo estiver ativo para não ficar tocando no menu de Game Over
            if (gameActive) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'square'; // Onda quadrada para som de "nintendinho"
                osc.frequency.setValueAtTime(melodyNotes[noteIndex], audioCtx.currentTime);
                
                // Volume mais baixo que o beep para ficar de fundo
                gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
                
                noteIndex = (noteIndex + 1) % melodyNotes.length;
            }
        }

        // --- LÓGICA DE CORES ---
        function randomizeBackground() {
            bgColor = {
                r: Math.floor(Math.random() * 100),
                g: Math.floor(Math.random() * 100),
                b: Math.floor(Math.random() * 100)
            };
            canvas.style.backgroundColor = `rgb(${bgColor.r}, ${bgColor.g}, ${bgColor.b})`;
        }

        function getOppositeColor() {
            return `rgb(${255 - bgColor.r}, ${255 - bgColor.g}, ${255 - bgColor.b})`;
        }

        // --- SISTEMA DE HIGH SCORE ---
        let highScores = JSON.parse(localStorage.getItem('squareSliderScores')) || [];
        function updateHighScoreDisplay() {
            highScoreListElement.innerHTML = highScores.map(e => `<li>${e.name} <span class="score-val">${e.score}</span></li>`).join('') || '<li>Sem recordes</li>';
        }

        function checkHighScore(s) {
            if (s > 0 && (highScores.length < 5 || s > highScores[highScores.length-1].score)) {
                // Pequeno delay para o prompt não travar a renderização imediata do Game Over
                setTimeout(() => {
                    let name = prompt("Novo Recorde! Nome:") || "Anon";
                    highScores.push({ name: name.slice(0,10), score: s });
                    highScores.sort((a,b) => b.score - a.score);
                    highScores.splice(5);
                    localStorage.setItem('squareSliderScores', JSON.stringify(highScores));
                    updateHighScoreDisplay();
                }, 50);
            }
            
            // Exibe a tela de Game Over ao invés de resetar o jogo direto
            finalScoreDisplay.textContent = score;
            gameOverScreen.style.display = 'flex';
        }

        // --- CONTROLES E MECÂNICAS ---
        window.addEventListener('keydown', (e) => {
            if (!gameActive) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            // Inicia a música no primeiro toque de tecla
            if (!isMusicPlaying) {
                isMusicPlaying = true;
                setInterval(playBackgroundMusic, 200); // Velocidade da música (200ms por nota)
            }

            const k = e.key.toLowerCase();
            
            // Impede de dar ré diretamente
            if ((k==='w'||k==='arrowup') && player.dy === 0) { player.dx = 0; player.dy = -player.speed; }
            if ((k==='s'||k==='arrowdown') && player.dy === 0) { player.dx = 0; player.dy = player.speed; }
            if ((k==='a'||k==='arrowleft') && player.dx === 0) { player.dx = -player.speed; player.dy = 0; }
            if ((k==='d'||k==='arrowright') && player.dx === 0) { player.dx = player.speed; player.dy = 0; }
        });

        // Evento para o botão de jogar novamente
        playAgainBtn.addEventListener('click', () => {
            gameOverScreen.style.display = 'none';
            resetGame();
        });

        function spawnTarget() {
            const margin = 30; // Garante que não nasça colado na borda
            target.x = margin + Math.random() * (canvas.width - target.size - margin * 2);
            target.y = margin + Math.random() * (canvas.height - target.size - margin * 2);
        }

        function resetGame() {
            score = 0;
            scoreElement.textContent = score;
            player.x = canvas.width/2; player.y = canvas.height/2;
            player.dx = 0; player.dy = 0; player.speed = 3;
            trail = [];
            bgColor = {r:0, g:0, b:0};
            canvas.style.backgroundColor = 'black';
            gameActive = true;
            spawnTarget();
        }

        function update() {
            if (!gameActive) return;

            // Salva posição para a trilha
            trail.push({x: player.x, y: player.y});
            if (trail.length > 15) trail.shift(); // Tamanho da trilha (rastro)

            player.x += player.dx;
            player.y += player.dy;

            // Morte nas bordas
            if (player.x < 0 || player.x + player.size > canvas.width || player.y < 0 || player.y + player.size > canvas.height) {
                gameActive = false;
                setTimeout(() => checkHighScore(score), 10);
            }

            // Coleta ponto
            if (player.x < target.x + target.size && player.x + player.size > target.x &&
                player.y < target.y + target.size && player.y + player.size > target.y) {
                
                score++;
                playBeep();
                scoreElement.textContent = score;
                player.speed += 0.4;
                
                // Atualiza velocidade instantaneamente na direção atual
                if (player.dx !== 0) player.dx = Math.sign(player.dx) * player.speed;
                if (player.dy !== 0) player.dy = Math.sign(player.dy) * player.speed;

                if (score % 10 === 0) randomizeBackground();
                spawnTarget();
            }
        }

        function draw() {
            // Limpa a tela
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Desenha a Trilha (Cor Oposta)
            ctx.fillStyle = getOppositeColor();
            trail.forEach((pos, index) => {
                ctx.globalAlpha = index / trail.length; // Efeito de fade/transparência
                ctx.fillRect(pos.x + 4, pos.y + 4, player.size - 8, player.size - 8);
            });
            ctx.globalAlpha = 1.0;

            // Desenha o Alvo
            ctx.fillStyle = target.color;
            ctx.shadowBlur = 15; ctx.shadowColor = target.color;
            ctx.fillRect(target.x, target.y, target.size, target.size);

            // Desenha o Jogador
            ctx.fillStyle = player.color;
            ctx.shadowColor = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);
            ctx.shadowBlur = 0;

            requestAnimationFrame(() => { update(); draw(); });
        }

        // Inicia o jogo
        updateHighScoreDisplay();
        spawnTarget();
        draw();
    </script>
</body>
</html>
